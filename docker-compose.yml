services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao123
      POSTGRES_DB: bolao_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/data

volumes:
  postgres_data:
